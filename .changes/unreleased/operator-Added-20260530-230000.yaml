project: operator
kind: Added
body: "Added an optional `namespace` field to `clusterRef` (used by `ShadowLink`, `Topic`, `User`, `Role`, `Schema`, and `Group` resources). When set, the referenced Redpanda/Cluster is resolved in that namespace instead of the referencing object's namespace, enabling cross-namespace references such as a `ShadowLink` whose source and shadow clusters live in separate namespaces on the same Kubernetes cluster. This same-cluster, cross-namespace topology is intended mainly for development and test clusters (cheaply rehearsing shadow-link replication and failover on a single Kubernetes cluster, optionally pinning the two clusters to non-overlapping availability zones); production disaster recovery should still place the source and shadow clusters in separate Kubernetes clusters and failure domains."
