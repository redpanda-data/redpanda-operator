project: operator
kind: Changed
body: Moved per-K8s-cluster fields off `StretchCluster.spec` onto `RedpandaBrokerPool.spec` to enable heterogeneous broker pools (different TLS, listeners, external access, RBAC, ServiceAccount, monitoring, rack awareness, cluster domain, and logging per pool). Removed `service` entirely (use the new `internalServiceAnnotations` field on `StretchCluster.spec` to annotate the headless ClusterIP Service). `auditLogging` field type changed from `*AuditLogging` to `*StretchAuditLogging`. `storage`, `resources`, and `imagePullSecrets` remain legal on both specs and merge at render time — the pool's non-nil subfield wins, the cluster fills the rest (per-key for maps); `imagePullSecrets` does a pool-wins-if-non-empty override. The StatefulSet's `volumeClaimTemplates` ObjectMeta now propagates `pv.Annotations` and `pv.Labels`, and `persistentVolumeClaimRetentionPolicy` is sourced from the pool spec. Existing manifests with the moved fields on `StretchCluster.spec` must relocate them to each `RedpandaBrokerPool` spec; field shapes are unchanged.
time: 2026-05-27T06:47:15.000000Z
