body: Added `scrapeInterval` and `labels` fields to the operator Helm chart's `monitoring` configuration. `scrapeInterval` sets the scrape interval on the ServiceMonitor endpoint (defaults to empty, preserving the Prometheus global default). `labels` adds custom labels to the ServiceMonitor metadata.
