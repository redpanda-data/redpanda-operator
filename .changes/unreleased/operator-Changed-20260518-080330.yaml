project: operator
kind: Changed
body: |
    `cluster.redpanda.com/v1alpha2` StretchCluster and NodePool CRDs: per-K8s-cluster configuration moved from `StretchCluster.spec` to `NodePool.spec`. Removed from `StretchCluster.spec`: `clusterDomain`, `tls`, `external`, `listeners`, `rbac`, `serviceAccount`, `monitoring`, `service`, `rackAwareness`. Added to `NodePool.spec` (each pool may set its own value): `clusterDomain`, `tls`, `external`, `listeners`, `rbac`, `serviceAccount`, `monitoring`, `rackAwareness`, plus optional overrides for `storage`, `resources`, `imagePullSecrets`, `logging` (when unset, the value is inherited from `StretchCluster.spec`). The `np` short name on the NodePool CRD was dropped (collided with NetworkPolicy).
time: 2026-05-18T08:03:30.000000000Z
