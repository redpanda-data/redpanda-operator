project: operator
kind: Changed
body: |
    `cluster.redpanda.com/v1alpha2` StretchCluster: per-K8s-cluster configuration moved from `StretchCluster.spec` to the new `RedpandaBrokerPool` CRD. Removed from `StretchCluster.spec`: `clusterDomain`, `tls`, `external`, `listeners`, `rbac`, `serviceAccount`, `monitoring`, `service`. The new `RedpandaBrokerPool.spec` carries these fields per pool, plus optional `storage`, `resources`, `imagePullSecrets` overrides that fall back to `StretchCluster.spec` when unset. `StretchCluster.status.nodePools` renamed to `status.brokerPools`. The multicluster operator now reconciles `RedpandaBrokerPool` instead of `NodePool`; the single-cluster `NodePool` CRD is unchanged.
time: 2026-05-18T08:03:30.000000000Z
