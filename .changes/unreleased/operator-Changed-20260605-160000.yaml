project: operator
kind: Changed
body: "Controller reconcile (sync) intervals are now configurable on the operator instead of being hard-coded. New flags `--topic-sync-interval`, `--user-sync-interval`, `--group-sync-interval`, `--schema-sync-interval`, `--role-sync-interval`, and `--shadowlink-sync-interval` set the default reconcile cadence for each controller (Topic defaults to 30s; User/Group/Schema/Role/ShadowLink default to 5m). These are also exposed as first-class operator Helm chart values under `controllers.<resource>.interval` (named to match the `Topic` CR's `spec.interval`, rendered into the flags), in addition to `additionalCmdFlags`. The `Topic` CR continues to support a per-CR `spec.interval` that takes precedence over the operator default. As part of this, the `Topic` CRD no longer carries a baked-in `interval` default (previously `3s`); the default now lives in the operator. **This is introduced starting in the v26.2 operator.** Note on upgrade behavior: because the old CRD's `3s` default was applied by the API server at admission time, `Topic`s created under it already have `spec.interval: \"3s\"` persisted in etcd, and the controller treats any persisted `spec.interval` as an explicit per-CR override. Those existing `Topic`s therefore keep reconciling every 3s after upgrade — they do not automatically pick up the operator default. Only `Topic`s with no persisted `spec.interval` (i.e. created/applied against the new CRD, which has no baked-in default) inherit the operator default (30s, or whatever `--topic-sync-interval` is set to). To make a pre-existing `Topic` adopt the operator default, clear its stored value, e.g. `kubectl patch topic <name> --type=json -p='[{\"op\":\"remove\",\"path\":\"/spec/interval\"}]'`; to pin a specific cadence instead, set `spec.interval` on the resource or adjust the flag/Helm value."
