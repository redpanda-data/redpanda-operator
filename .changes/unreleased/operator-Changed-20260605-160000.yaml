project: operator
kind: Changed
body: "Controller reconcile (sync) intervals are now configurable on the operator instead of being hard-coded. New flags `--topic-sync-interval`, `--user-sync-interval`, `--group-sync-interval`, `--schema-sync-interval`, `--role-sync-interval`, and `--shadowlink-sync-interval` set the default reconcile cadence for each controller (Topic defaults to 30s; User/Group/Schema/Role/ShadowLink default to 5m). These are also exposed as first-class operator Helm chart values under `controllers.<resource>.interval` (named to match the `Topic` CR's `spec.interval`, rendered into the flags), in addition to `additionalCmdFlags`. The `Topic` CR continues to support a per-CR `spec.interval` that takes precedence over the operator default. As part of this, the `Topic` CRD no longer carries a baked-in `interval` default (previously `3s`); the default now lives in the operator. **This is introduced starting in the v26.2 operator.** On upgrade to v26.2, any `Topic` that never set `spec.interval` moves from the old 3s reconcile cadence to the operator default (30s, or whatever `--topic-sync-interval` is set to); set `spec.interval` on the resource, or adjust the flag/Helm value, to restore a specific cadence."
