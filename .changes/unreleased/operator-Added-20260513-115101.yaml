project: operator
kind: Added
body: 'Added end-to-end operator observability for the multicluster operator. (1) Multicluster raft metrics under `operator_multicluster_raft_*` — leader changes, sent/received message rates by type and peer, send latency / errors / drops, peer reachability, snapshot bookkeeping, plus collector-emitted gauges for current term, state, and per-peer send-queue length read on scrape from the transport''s atomics so the Ready loop hot path stays write-free. (2) Reconcile-health metrics under `operator_controller_*` — `reconcile_steady_state_total` (counter) and `reconcile_last_success_timestamp_seconds` (gauge), wrapper-emitted automatically for every controller via `observability.Wrap(reconciler, controller, defaultRequeueTimeout)`. Both `(Result{}, nil)` and `(Result{RequeueAfter: defaultRequeueTimeout}, nil)` count as steady state so controllers using the periodic-requeue pattern (e.g. `MulticlusterReconciler`''s defer-set `RequeueAfter`) register as healthy. (3) StretchCluster member-status metrics under `operator_stretchcluster_*` — `member_reachable`, `brokers` / `brokers_ready`, `replication_health`, `spec_drift`, recorded by the `MulticlusterReconciler` alongside data it already computes (background reachability probe, NodePool fetch, `checkSpecConsistency`, admin API health check) — no new RPCs. New `monitoring.rulesEnabled` chart value ships a starter PrometheusRule with recording rules and alerts covering errored reconciles, runaway reconcile rate, stalled controllers, worker pool saturation, member unreachability, broker count skew, spec drift, and unhealthy replication. Comprehensive single-view Grafana dashboard at `docs/operator-grafana-dashboard.json`; canonical metric inventory at `docs/operator-metrics.md`.'
