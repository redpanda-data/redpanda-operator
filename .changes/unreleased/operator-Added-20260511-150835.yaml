body: 'Added the operator reconcile-health metric `operator_controller_reconcile_steady_state_total` (counter) emitted automatically for every controller via a wrapping `Reconciler` middleware. New `monitoring.rulesEnabled` chart value ships a starter PrometheusRule with recording rules and alerts (runaway reconcile rate, sustained errors, stalled controller, worker pool saturation). Metric inventory at `docs/operator-metrics.md`; starter Grafana dashboard at `docs/operator-grafana-dashboard.json`.'
