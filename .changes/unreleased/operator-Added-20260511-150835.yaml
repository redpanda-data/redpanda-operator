project: operator
kind: Added
body: 'Added operator reconcile-health metrics under the `operator_controller_*` family: `reconcile_steady_state_total` (counter) and `reconcile_requeue_after_seconds` (histogram) emitted automatically for every controller via a wrapping `Reconciler` middleware. New `monitoring.rulesEnabled` chart value ships a starter PrometheusRule with recording rules and alerts (runaway reconcile rate, sustained errors, stalled controller, worker pool saturation). Metric inventory at `docs/operator-metrics.md`; starter Grafana dashboard at `docs/operator-grafana-dashboard.json`.'
