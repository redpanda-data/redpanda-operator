project: operator
kind: Added
body: |
  Adopted Redpanda 25.1+'s per-broker pre-restart probe (ENG-222) as the primary
  rolling-restart gate. The operator now consults /v1/broker/pre_restart_probe
  for the specific broker it's about to roll, and proceeds only when the broker
  reports no acks=1 data-loss risk, no produce/consume unavailability, and no
  acks=-1 produce rejection. RF=1 offline is treated as acceptable risk. On
  clusters older than 25.1 the helper detects 404 and falls back to the
  cluster-wide IsHealthy heuristic so behavior on pre-25.1 brokers is unchanged.
  The rolling-restart loop also consults the matching post-restart probe
  (/v1/broker/post_restart_probe, load_reclaimed_pc) to verify each broker has
  finished its post-restart replica recovery before the next pod is rolled.
  The sidecar readiness probe (Prober.IsClusterBrokerHealthy) is intentionally
  NOT switched to the per-broker probe — the pre-restart probe answers
  "would restarting me cause risks?" which is stricter than "am I serving?"
  and would keep pods NotReady through cluster bootstrap.
