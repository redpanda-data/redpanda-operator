project: operator
kind: Changed
body: "`--additional-controllers=decommission` now runs the NodePool-aware `StatefulSetDecommissioner` operator-wide for V2 (`Redpanda`) clusters instead of the old `DecommissionReconciler`. It resolves each chart-rendered StatefulSet back to its `Redpanda` CR and builds the admin client from the chart-rendered DNS (avoiding the old controller's `fullnameOverride` DNS bug) and is correct for clusters split across multiple NodePools. Operators already passing `--additional-controllers=decommission` (or `all`) are migrated to the new controller automatically on upgrade; no configuration change is required. `decommissionV2` is accepted as an alias."
time: 2026-06-01T12:00:00.000000-07:00
