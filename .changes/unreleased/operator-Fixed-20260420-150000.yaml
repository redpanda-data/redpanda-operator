project: operator
kind: Fixed
body: |
  Fixed a SASL bootstrap-user password drift that left clusters unauthenticated after the
  bootstrap user Secret was deleted. When the Secret was removed — for example, to migrate
  from a Helm-era Secret to operator-managed ownership — the operator regenerated it with a
  fresh random password while the running Redpanda cluster retained the original password
  in its internal SCRAM DB, causing rpk and other consumers of the new Secret to fail with
  SASL_AUTHENTICATION_FAILED after the next pod restart.
time: 2026-04-20T15:00:00.000000+00:00
