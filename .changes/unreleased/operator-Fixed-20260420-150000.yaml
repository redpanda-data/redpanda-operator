project: operator
kind: Fixed
body: |
  Fixed a SASL bootstrap-user password drift that left clusters unauthenticated after
  the bootstrap user Secret was rotated. When the Secret was deleted — for example, to
  migrate from a Helm-era Secret to operator-managed ownership — the operator
  regenerated it with a fresh random password, but the running Redpanda cluster retained
  the original password in its internal SCRAM DB because the sidecar configwatcher
  explicitly created the internal superuser only once. The configwatcher now mirrors the
  Secret's password into Redpanda's SCRAM DB via the admin API whenever its user-sync
  runs — at pod start and on fsnotify events when the mounted Secret changes, not on a
  timer — so a rotated bootstrap user Secret propagates into the running cluster and
  rpk keeps authenticating after the next pod restart.
