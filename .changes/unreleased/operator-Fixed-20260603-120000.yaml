project: operator
kind: Fixed
body: "Hardened the PVCUnbinder against multi-broker concurrent disruption. The unbinder used to act on each Pending broker pod in isolation, which during a K8s-wide event (cluster upgrade, AZ flake) could delete every broker's PVCs in parallel and — with `--allow-pv-rebinding=true` — let the scheduler cross-bind the freed PVs, leaving each broker with another broker's data. The reconcile now defers when (a) the parent CR carries the `operator.redpanda.com/pause-pvc-unbinder=true` annotation, (b) stuck pods span more than one node (auto-detected multi-node event), (c) a sibling pod's PVC is mid-recovery in the same cluster, or (d) a recent unbind in the same cluster hasn't yet been observed as settled through the informer cache. A new `--broker-pod-node-unavailable-toleration` flag injects long NotReady/Unreachable tolerations into broker pod templates so brief node unreachability no longer triggers the eviction → Pending → unbind chain in the first place. `--allow-pv-rebinding` is deprecated; the new gates make it unnecessary and unsafe."
time: 2026-06-03T12:00:00.000000-07:00
