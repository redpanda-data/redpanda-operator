project: operator
kind: Added
body: Operator releases now publish the `rpk-k8s` CLI as a managed rpk plugin. On each `operator/v*` release the per-OS/arch `rpk-k8s` binaries are uploaded to the rpk plugins repository (rpk-plugins.redpanda.com) with a generated manifest, so users can install and run it via `rpk k8s` (auto-downloaded, checksum-verified, and cached by rpk on first use).
