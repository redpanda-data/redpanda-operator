project: charts/redpanda
kind: Added
body: Support Redpanda 26.1's built-in ghost node auto-decommissioning. For Redpanda >= 26.1.1, users can enable ghost node auto-ejection by setting `config.cluster.partition_autobalancing_node_autodecommission_time` in Helm values. Recommended value is 86400 (24 hours in seconds). This feature is disabled by default.
