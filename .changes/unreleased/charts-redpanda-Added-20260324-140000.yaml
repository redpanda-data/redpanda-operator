project: charts/redpanda
kind: Added
body: Enable Redpanda 26.1's built-in ghost node auto-decommissioning by default. When deploying Redpanda >= 26.1.1, the cluster property `partition_autobalancing_node_autodecommission_time` is set to 1800 seconds (30 minutes). This can be overridden or disabled via `config.cluster.partition_autobalancing_node_autodecommission_time` in Helm values.
