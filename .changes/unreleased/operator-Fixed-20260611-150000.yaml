project: operator
kind: Fixed
body: "The rpk configuration inside broker pods no longer goes stale after brokers join or leave the cluster, in both the v1 (`Cluster` CRD) and v2 (`Redpanda` CRD) operators. Previously it was rendered once at pod startup, and because seed-server changes intentionally do not trigger rolling restarts, in-pod `rpk` kept whatever broker list existed when the pod started — e.g. a mix of old and new pool seed brokers after a NodePool blue/green migration. Both operators now refresh it restart-free from the kubelet-propagated ConfigMap mount, sharing a common watch loop: v1 broker pods gain a lightweight `rpk-profile-updater` sidecar that re-renders `/var/lib/redpanda/.config/rpk/rpk.yaml`, and the existing v2 sidecar gains `--watch-rpk-profile` (enabled by the chart), which re-grafts the `rpk:` stanza of `/etc/redpanda/redpanda.yaml` from the chart-rendered base-config while preserving the per-pod settings applied at startup. Note: the pod-template changes (new v1 container; new v2 sidecar mount/args) cause one rolling restart of clusters on operator/chart upgrade. Deployments that pin `--configurator-tag` (v1) or `sideCars.image.tag` (v2) to an older operator release must bump those pins to this release or later — the refresh runs in those images, and an older image does not recognize the new subcommand/flag."
time: 2026-06-11T15:00:00.000000-07:00
