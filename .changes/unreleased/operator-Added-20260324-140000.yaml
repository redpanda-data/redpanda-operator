project: operator
kind: Added
body: Support Redpanda 26.1's built-in ghost node auto-decommissioning. For Redpanda >= 26.1.1 clusters, users can enable ghost node auto-ejection by setting `spec.clusterSpec.config.cluster.partition_autobalancing_node_autodecommission_time` in the Redpanda CRD. Recommended value is 86400 (24 hours in seconds). This feature is disabled by default.
time: 2026-03-24T14:00:00.000000-04:00
