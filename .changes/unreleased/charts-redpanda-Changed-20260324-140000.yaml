project: charts/redpanda
kind: Changed
body: For Redpanda >= 26.1.1 clusters, ghost node ejection can be handled natively by Redpanda's partition balancer rather than the operator. Set `partition_autobalancing_node_autodecommission_time` in `config.cluster` to enable (recommended 86400 seconds / 24 hours). Only effective when `partition_autobalancing_mode` is set to `continuous`. This feature is disabled by default.
time: 2026-03-24T14:00:01.000000-04:00
