project: charts/redpanda
kind: Added
body: |-
    `tuning.apply_host_tuners` (default `false`) gates a chroot-based tuning
    init container that gives `rpk redpanda tune all` real access to the
    host's `/sys`, `/proc`, NICs and block devices. When enabled, tuners
    that previously failed inside the pod sandbox — `disk_irq`,
    `disk_scheduler`, `disk_nomerges`, `net`, `fstrim`, and (on GCP)
    `disk_write_cache` — are default-enabled and actually apply, along
    with `cpu` (a no-op on VMs without cpufreq, real work on metal).

    Opt-in only; the default tuning container is unchanged. Enabling
    `apply_host_tuners` requires the same security posture as
    `tune_aio_events` (privileged container, hostPath volumes).
