version: '3'

tasks:
  retry-task:
    vars:
      TASK_EXEC: '{{default "task" .TASK_EXEC}}'
      RETRY_COUNT: '{{default 3 .RETRY_COUNT}}'
      SLEEP_INTERVAL: '{{default 3 .SLEEP_INTERVAL}}'
    cmds:
      - echo "will retry task {{.TASK}}"
      - |
        retry_times={{.RETRY_COUNT}}
        retry_index=0
        while ((retry_index < retry_times)); do
          set +e
          {{.TASK_EXEC}} {{.TASK}} {{.PARAMS}}
          cmd_code="$?"
          set -e
          if [[ $cmd_code == "0" ]]; then
            break
          fi
          let retry_index=retry_index+1
          echo "retrying task {{.TASK}}, attempt $retry_index, after sleep {{.SLEEP_INTERVAL}}"
          sleep {{.SLEEP_INTERVAL}}
        done
        if [[ $cmd_code != "0" ]]; then
          echo "retried '{{.TASK}}' task {{.RETRY_COUNT}} times and failed"
          exit $cmd_code
        fi
    preconditions:
      - test -n '{{.TASK}}'

  download-integration-artifacts:
    silent: true
    vars:
      BRANCH: '{{default "" .BRANCH}}'
    cmds:
      - ./ci/scripts/download-otel-artifacts.sh "{{.BRANCH}}" integration

  download-kuttl-artifacts:
    silent: true
    vars:
      BRANCH: '{{default "" .BRANCH}}'
    cmds:
      - ./ci/scripts/download-kuttl-artifacts.sh "{{.BRANCH}}"

  create-buildx-builder:
    cmds:
      - task: :dev:retry-task
        vars:
          TASK: dev:retry-create-buildx-builder
    status:
      - docker buildx ls | grep -q v-builder

  retry-create-buildx-builder:
    cmds:
      - docker buildx create --driver-opt env.BUILDKIT_STEP_LOG_MAX_SIZE=-1 --driver-opt env.BUILDKIT_STEP_LOG_MAX_SPEED=-1 --platform linux/amd64,linux/arm64 --name v-builder --use
      - '{{if eq ARCH "amd64"}} docker run --rm --privileged linuxkit/binfmt:v0.8 {{else}} echo "" {{end}}'

  update-licenses:
    cmds:
      - licenseupdater ./... -config .licenseupdater.yaml

  setup-multicluster-dev-env:
    - 'echo "--- Setting up multicluster dev env using k3s and vCluster(s)"'
    # -groups dev-env narrows the multicluster suite to stretch-cluster-basics.feature
    # (the only feature tagged @dev-env), so the rest of the multicluster features
    # are skipped without having to delete the .feature files locally.
    - task: :test:acceptance-multicluster
      vars:
        CLI_ARGS: '{{.CLI_ARGS}} -v -count=1 -multi-cluster-setup-only -groups dev-env'

  setup-dev-env:
    - 'echo "--- Setting up dev env using k3s with a basic Redpanda cluster"'
    - task: :test:acceptance
      vars:
        CLI_ARGS: '{{.CLI_ARGS}} -v -count=1 -acceptance-setup-only'

  setup-dev-env-with-nodepools:
    - 'echo "--- Setting up dev env using k3s with a basic Redpanda cluster + 2 NodePools (3 brokers total)"'
    - task: :test:acceptance
      vars:
        CLI_ARGS: '{{.CLI_ARGS}} -v -count=1 -acceptance-setup-only -acceptance-setup-nodepools=2'

  setup-monitoring:
    desc: |
      Deploy Prometheus + Grafana to the host k3s cluster and a Prometheus
      agent inside each vCluster (auto-discovered via the `app=vcluster`
      pod label). The vCluster agents scrape their local operator pod's
      /metrics and remote_write samples to the host Prometheus. Grafana
      is exposed at host NodePort 30030 (admin/admin); Prometheus at
      NodePort 30090.
      Requires that `task dev:setup-multicluster-dev-env` has already run.
    vars:
      # ROOT_DIR resolves to the directory of the root Taskfile.yml (the
      # repo root). TASKFILE_DIR would resolve to taskfiles/ which is
      # wrong here — dev-env-monitoring/ lives at the repo root.
      MONITORING_DIR: '{{.ROOT_DIR}}/dev-env-monitoring'
    cmds:
      - 'echo "--- Installing kube-prometheus-stack on host k3s (k3d-harpoon)"'
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts >/dev/null 2>&1 || true
      - helm repo update prometheus-community >/dev/null
      - |
        kubectl --context k3d-harpoon create namespace monitoring --dry-run=client -o yaml | \
          kubectl --context k3d-harpoon apply -f -
      - |
        helm --kube-context k3d-harpoon upgrade --install monitoring \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --values {{.MONITORING_DIR}}/host-values.yaml \
          --wait --timeout 5m
      - 'echo "--- Discovering host node IP for vCluster remote_write target"'
      - |
        HOST_IP=$(kubectl --context k3d-harpoon get node -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
        echo "host IP: $HOST_IP"
        # Auto-discover vCluster namespaces by looking for pods labelled
        # app=vcluster on the host cluster — vCluster's chart sets this
        # label on its statefulset, so each vCluster's namespace appears
        # once. The suffix in vc-<random>-N is regenerated on every
        # setup-multicluster-dev-env run, so hardcoding names breaks
        # after a reset.
        VCLUSTER_NAMESPACES=$(kubectl --context k3d-harpoon get pods --all-namespaces -l app=vcluster -o=jsonpath='{range .items[*]}{.metadata.namespace}{"\n"}{end}' | sort -u)
        if [ -z "$VCLUSTER_NAMESPACES" ]; then
          echo "ERROR: no vClusters found on k3d-harpoon (no pods with label app=vcluster). Run task dev:setup-multicluster-dev-env first."
          exit 1
        fi
        echo "discovered vClusters: $(echo $VCLUSTER_NAMESPACES | tr '\n' ' ')"
        for NS in $VCLUSTER_NAMESPACES; do
          echo "--- Connecting to vCluster $NS"
          KUBECONFIG_FILE=$(mktemp)
          ( cd / && vcluster connect -n "$NS" "$NS" --silent --print 2>/dev/null ) | \
            awk '/^apiVersion:/{found=1} found && !/^Forwarding/{print} /^Forwarding/{exit}' > "$KUBECONFIG_FILE"
          # vcluster --background-proxy (the default in v0.31) spawns a
          # docker container that holds the port-forward, but vcluster
          # connect prints the kubeconfig before the container has bound
          # its port. kubectl would race and get "connection refused".
          # Wait for the port to be live before continuing.
          PORT=$(awk '/server: https:/ {sub(/.*:/, "", $2); print $2; exit}' "$KUBECONFIG_FILE")
          if [ -z "$PORT" ]; then
            echo "ERROR: could not parse vcluster API port from kubeconfig for $NS"
            cat "$KUBECONFIG_FILE"
            rm -f "$KUBECONFIG_FILE"
            exit 1
          fi
          for _ in $(seq 1 30); do
            if (echo >/dev/tcp/127.0.0.1/"$PORT") 2>/dev/null; then break; fi
            sleep 1
          done
          echo "--- Deploying Prometheus agent in $NS"
          sed -e "s|\${VCLUSTER_NAME}|$NS|g" -e "s|\${HOST_IP}|$HOST_IP|g" \
            {{.MONITORING_DIR}}/vcluster-prometheus.yaml.template | \
            kubectl --kubeconfig "$KUBECONFIG_FILE" apply -f -
          rm -f "$KUBECONFIG_FILE"
        done
      - 'echo ""'
      - 'echo "Grafana:    http://<host-ip>:30030  (admin/admin)"'
      - 'echo "Prometheus: http://<host-ip>:30090"'
      - 'echo ""'
      - 'echo "Sample query: operator_multicluster_raft_state"'