# ===== Cluster: cluster-a =====
apiVersion: v1
kind: Namespace
metadata:
  name: redpanda
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: cluster-a
    app.kubernetes.io/name: operator
    operator.redpanda.com/bootstrap-managed: "true"
  name: cluster-a-multicluster-peer
  namespace: redpanda
spec:
  ports:
  - name: raft
    port: 9443
    protocol: TCP
    targetPort: 9443
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/instance: cluster-a
    app.kubernetes.io/name: operator
  type: LoadBalancer
---
