apiVersion: cluster.redpanda.com/v1alpha2
kind: Role
metadata:
  name: combined-role
status:
  conditions:
  - type: Synced
    status: "True"
    reason: ResourceSynced
  managedAcls: false  # ACLs no longer managed
  managedRole: true   # Role still managed
---
apiVersion: v1
kind: Event
metadata:
  namespace: redpanda-system
involvedObject:
  kind: Role
  name: combined-role
reason: ResourceSynced
message: "Role transitioned to principals-only mode, ACLs removed"
type: Normal