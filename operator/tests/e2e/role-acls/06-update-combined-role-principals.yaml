apiVersion: cluster.redpanda.com/v1alpha2
kind: Role
metadata:
  name: combined-role
spec:
  cluster:
    clusterRef:
      name: redpanda-cluster
  principals:
  - "User:charlie"
  - "User:dave"
  - "User:eve"  # Adding new principal
  authorization:
    acls:
    - type: Allow
      resource:
        type: Topic
        name: team-topic
      operations:
      - Read
      - Write
    - type: Allow
      resource:
        type: Group
        name: team-group
      operations:
      - Read