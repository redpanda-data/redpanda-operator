apiVersion: cluster.redpanda.com/v1alpha2
kind: Role
metadata:
  name: test-role
spec:
  cluster:
    clusterRef:
      name: redpanda-cluster
  authorization:
    acls:
    - type: Allow
      resource:
        type: Topic
        name: test-topic
      operations:
      - Read
      - Write
    - type: Allow
      resource:
        type: Group
        name: test-group
      operations:
      - Read